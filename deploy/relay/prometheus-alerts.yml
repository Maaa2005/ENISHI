groups:
  - name: enishi-relay
    rules:
      - alert: EnishiRelayDown
        expr: up{job="enishi-relay"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: ENISHI Relay scrape target is down

      - alert: EnishiRelayReadinessFailure
        expr: increase(enishi_relay_readiness_failures_total[5m]) > 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: ENISHI Relay cannot access its mailbox

      - alert: EnishiRelayPendingBacklog
        expr: enishi_relay_pending_messages > 100
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: ENISHI Relay pending mailbox is growing

      - alert: EnishiRelayAuthenticationSpike
        expr: increase(enishi_relay_rejections_total{code="RELAY_UNAUTHORIZED"}[5m]) > 50
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: ENISHI Relay authentication failures are elevated

      - alert: EnishiRelayRestartLoop
        expr: resets(enishi_relay_uptime_seconds[15m]) > 2
        labels:
          severity: critical
        annotations:
          summary: ENISHI Relay is restarting repeatedly
