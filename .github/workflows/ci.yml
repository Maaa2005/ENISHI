name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python and Relay deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
      - name: Install Python
        run: uv python install 3.12
      - name: Sync workspace
        run: uv sync --locked --all-packages --all-groups
      - name: Verify generated protocol resources
        run: python scripts/sync_protocol_schema.py --check
      - name: Test
        run: uv run pytest -q
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy services/local-core/enishi_core services/relay/relay services/enishi-mcp/enishi_mcp
      - name: Validate Relay deployment
        run: docker compose --env-file deploy/relay/.env.example -f deploy/relay/compose.yaml config --quiet
      - name: Build locked Relay image
        run: docker build -f deploy/relay/Dockerfile -t enishi-relay-ci .

  desktop:
    name: Desktop frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build --workspace apps/desktop

  rust:
    name: Tauri Rust
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/desktop/src-tauri
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Toolchain versions
        run: rustc --version && cargo --version
      - name: Check lockfile
        run: cargo metadata --locked --format-version 1 --no-deps > /dev/null
      - name: Test
        run: cargo test --locked
      - name: Check
        run: cargo check --locked

  pairing-e2e:
    name: Signed two-node pairing E2E
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.29"
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --locked --all-packages --all-groups
      - run: ./scripts/run_pairing_e2e.sh

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
